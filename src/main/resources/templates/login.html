<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 本地文档管理系统'">登录 - 本地文档管理系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-panel">
    <div class="login-brand">
        <span class="leaf-mark">◒</span>
        <strong>Paperless-ngx</strong>
        <small>本地文档管理系统</small>
    </div>
    <div class="alert success" th:if="${param.logout}">已退出登录</div>
    <div class="alert danger" th:if="${error}" th:text="${error}">用户名或密码错误</div>
    <form class="login-form" action="/login" method="post">
        <label>
            用户名
            <input type="text" name="username" placeholder="admin" th:value="${username}">
        </label>
        <label>
            密码
            <input type="password" name="password" placeholder="password">
        </label>
        <button type="submit">登录</button>
    </form>
    <p class="login-hint">演示账号：admin / admin123；普通用户：user / user123。</p>
</main>
</body>
</html>
