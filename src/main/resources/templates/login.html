<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 本地文档管理系统'">登录 - 本地文档管理系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-panel">
    <div class="login-brand">
        <span class="leaf-mark">◒</span>
        <strong>本地文档管理系统</strong>
        <small>本地文档管理系统</small>
    </div>
    <div class="alert success" th:if="${param.logout}">已退出登录</div>
    <div class="alert success" th:if="${success}" th:text="${success}">操作成功</div>
    <div class="alert danger" th:if="${error}" th:text="${error}">用户名或密码错误</div>
    <form th:if="${pageTitle == '登录'}" class="login-form" action="/login" method="post">
        <label>
            用户名
            <input type="text" name="username" placeholder="admin" th:value="${username}">
        </label>
        <label>
            密码
            <input type="password" name="password" placeholder="password">
        </label>
        <button type="submit">登录</button>
    </form>
    <form th:if="${pageTitle == '注册账号'}" class="login-form" action="/register" method="post">
        <label>
            用户名
            <input type="text" name="username" placeholder="请输入登录账号" required>
        </label>
        <label>
            昵称
            <input type="text" name="nickname" placeholder="请输入显示昵称" required>
        </label>
        <label>
            邮箱
            <input type="email" name="email" placeholder="可选">
        </label>
        <label>
            密码
            <input type="password" name="password" placeholder="至少 6 位" required>
        </label>
        <label>
            确认密码
            <input type="password" name="confirmPassword" placeholder="再次输入密码" required>
        </label>
        <button type="submit">注册</button>
    </form>
    <form th:if="${pageTitle == '忘记密码'}" class="login-form" action="/forgot-password" method="post">
        <label>
            用户名
            <input type="text" name="username" placeholder="请输入登录账号" required>
        </label>
        <label>
            注册邮箱
            <input type="email" name="email" placeholder="请输入账号绑定邮箱" required>
        </label>
        <label>
            新密码
            <input type="password" name="newPassword" placeholder="至少 6 位" required>
        </label>
        <label>
            确认新密码
            <input type="password" name="confirmPassword" placeholder="再次输入新密码" required>
        </label>
        <button type="submit">重置密码</button>
    </form>
    <p class="login-hint" th:if="${pageTitle == '登录'}">
        演示账号：admin / admin123；普通用户：user / user123。<br>
        <a href="/register">立即注册</a> · <a href="/forgot-password">忘记密码</a>
    </p>
    <p class="login-hint" th:if="${pageTitle == '注册账号'}">
        已有账号？<a href="/login">返回登录</a>
    </p>
    <p class="login-hint" th:if="${pageTitle == '忘记密码'}">
        想起密码了？<a href="/login">返回登录</a>
    </p>
</main>
</body>
</html>
